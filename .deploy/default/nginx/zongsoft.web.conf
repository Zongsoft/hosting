# The api(back-end) of any environment configuration for the Nginx

# default site
server {
    listen       80;
    listen       [::]:80;
    server_name  api.zongsoft.com;

    location / {
        proxy_pass         http://127.0.0.1:8069/;
    }

    # listen       443 ssl http2;
    # listen       [::]:443 ssl http2;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout  10m;
    ssl_ciphers PROFILE=SYSTEM;
    ssl_prefer_server_ciphers on;
}

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    location / {
        proxy_pass         http://127.0.0.1:8069/;
    }
}
